<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/filmes.css">
    <title>Document</title>
</head>

<body>
    <header>
        <nav>
            <a class="logo" href="/">FILMZONE</a>
            <div class="mobile-menu">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
            <ul class="nav-list">
                <li><a href="#">Início</a></li>
                <li><a href="Cadastro.html">Login</a></li>
                <li><a href="#">cadastrar filmes</a></li>
                <li><a href="#">Categorias</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h1>Cadastro de Filmes</h1>

        <form id="filmeForm">
            <label for="nome">Nome do Filme</label>
            <input type="text" id="nome" placeholder="Digite o nome do filme" required />

            <label for="nome">Ano de lançamento</label>
            <input type="number" id="ano" min="1000" max="2100" placeholder="Digite o ano de lançamento desse filme"
                required />

            <label for="nome">Gênero</label>
            <select id="gereno" required>
                <option>Ação</option>
                <option>Comédia</option>
                <option>Drama</option>
                <option>Terror</option>
                <option>Ficção Científica</option>
                <option>Romance</option>
                <option>Documentário</option>
            </select>

            <label>Classificação indicativa</label>
            <select id="gereno" required>
                <option>Livre</option>
                <option>+10</option>
                <option>+12</option>
                <option>+14</option>
                <option>+16</option>
                <option>+18</option>
            </select>

            <label>Duração do Filme (Minutos)</label>
            <input type="number" id="duração" required />

            <label>Diretor</label>
            <input type="text" id="diretor" required>

            <label>Elenco Principal</label>
            <input type="text" id="elenco" placeholder="Separe por vírgulas" required />

            <label>Link do Pôster</label>
            <input type="url" id="poster" required/>

            <div class="poster-preview">
                <img id="posterImg">
            </div>

            <label>Resumo</label>
            <textarea id="resumo" maxlength="500"></textarea>
            <div class="counter" id="contador">0 / 500</div>

            <label>Link do trailer</label>
            <input type="url" id="trailer">

            <button type="submit">cadastrar Filme</button>

            <div class="success" id="sucesso">Filme cadastrado com sucesso</div>
        </form>
    </div>


    <script src="js/filmes.js"></script>

</body>

</html>
